<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexventory — Service Unavailable</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f1419;
      color: #e8edf4;
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 1.5rem;
    }
    main {
      max-width: 420px;
      text-align: center;
      border: 1px solid #2a3544;
      border-radius: 8px;
      padding: 2rem;
      background: #161d27;
    }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
    p { color: #8b9cb3; margin: 0; font-size: 0.95rem; }
    code { color: #3b82f6; }
  </style>
</head>
<body>
  <main>
    <h1>502 — API unavailable</h1>
    <p>The Nexventory API is not responding. The database or API container may still be starting.</p>
    <p style="margin-top:1rem">Retry in a moment or check <code>docker compose logs api</code>.</p>
  </main>
</body>
</html>
