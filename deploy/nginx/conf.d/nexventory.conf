# Nexventory — reverse proxy to FastAPI (service name: api)
#
# Mounted at /etc/nginx/conf.d/default.conf in the nginx container.
# Client traffic: host:80 → nginx → http://api:8000

# ---------------------------------------------------------------------------
# upstream — backend pool (one API container today; add more servers for LB)
# ---------------------------------------------------------------------------
upstream nexventory_api {
    # Compose DNS name "api" resolves on the nexventory_backend network
    server api:8000;

    # Reuse connections to uvicorn (reduces latency under load)
    keepalive 32;
}

# ---------------------------------------------------------------------------
# WebSocket upgrade map (optional; safe default for non-WebSocket requests)
# ---------------------------------------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---------------------------------------------------------------------------
# HTTP server — port 80 (TLS can be added in a second server {} block later)
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    # Hide nginx version in error pages / Server header
    server_tokens off;

    # Access log format includes upstream timing (useful when debugging latency)
    access_log /var/log/nginx/nexventory.access.log combined;
    error_log  /var/log/nginx/nexventory.error.log warn;

    # Gzip — compress JSON/text responses from the API
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml
        application/xml;

    # Custom errors when the API container is down or unreachable
    error_page 502 503 /errors/502.html;
    location = /errors/502.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Maintenance page (optional): uncomment and point traffic here during deploys
    # location / {
    #     root /usr/share/nginx/html;
    #     try_files /maintenance.html =503;
    # }

    # Health via proxy (same path as FastAPI — used by Compose healthcheck)
    location = /health {
        proxy_pass http://nexventory_api/health;
        access_log off;
        include /etc/nginx/proxy_params;
    }

    location = /health/ready {
        proxy_pass http://nexventory_api/health/ready;
        access_log off;
        include /etc/nginx/proxy_params;
    }

    # All API routes, Swagger (/docs), OpenAPI JSON, ReDoc (/redoc)
    location / {
        proxy_pass http://nexventory_api;

        # Standard proxy headers (also in proxy_params; repeated for clarity)
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket support (future dashboards / streaming)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts — avoid hung clients if the API is slow or stuck
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Basic security headers on responses to browsers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
    }
}
