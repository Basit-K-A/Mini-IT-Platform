# Nexventory — reverse proxy to FastAPI + React SPA at /app/
#
# Mounted at /etc/nginx/conf.d/default.conf in the nginx container.
# Client traffic: host:80 → nginx → API (api:8000) and static UI (/app/)

# ---------------------------------------------------------------------------
# upstream — backend pool (one API container today; add more servers for LB)
# ---------------------------------------------------------------------------
upstream nexventory_api {
    # Compose DNS name "api" resolves on the nexventory_backend network
    server api:8000;

    # Reuse connections to uvicorn (reduces latency under load)
    keepalive 32;
}

# ---------------------------------------------------------------------------
# WebSocket upgrade map (optional; safe default for non-WebSocket requests)
# ---------------------------------------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---------------------------------------------------------------------------
# HTTP server — port 80 (TLS can be added in a second server {} block later)
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    # Hide nginx version in error pages / Server header
    server_tokens off;

    access_log /var/log/nginx/nexventory.access.log combined;
    error_log  /var/log/nginx/nexventory.error.log warn;

    # Static root: React build mounted at html/app (see docker-compose.yml)
    root /usr/share/nginx/html;

    # Gzip — compress JSON/text responses from the API and static assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml
        application/xml;

    # Custom errors when the API container is down or unreachable
    error_page 502 503 /errors/502.html;
    location = /errors/502.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Health via proxy (Compose healthcheck uses /health)
    location = /health {
        proxy_pass http://nexventory_api/health;
        access_log off;
        include /etc/nginx/snippets/proxy_api.conf;
    }

    location = /health/ready {
        proxy_pass http://nexventory_api/health/ready;
        access_log off;
        include /etc/nginx/snippets/proxy_api.conf;
    }

    # API under /api — use VITE_API_URL=/api on the frontend (same origin on EC2)
    location /api/ {
        proxy_pass http://nexventory_api/;

        include /etc/nginx/snippets/proxy_api.conf;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Swagger / OpenAPI (direct paths for operators)
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass http://nexventory_api;

        include /etc/nginx/snippets/proxy_api.conf;
    }

    # React SPA — production build in /usr/share/nginx/html/app/
    # Build: cd frontend && npm run build  (uses base: /app/)
    location = /app {
        return 301 /app/;
    }

    location /app/ {
        try_files $uri $uri/ /app/index.html;
    }

    # Site root → dashboard UI
    location = / {
        return 302 /app/;
    }
}
