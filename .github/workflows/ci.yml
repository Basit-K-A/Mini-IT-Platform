# Validate Docker build on every push and pull request
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose configuration
        run: |
          docker compose -f docker-compose.yml config
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config

      - name: Build API image
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml build api

      - name: Smoke test API container
        run: |
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d db
          sleep 10
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d api
          sleep 15
          docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T api \
            python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
          docker compose -f docker-compose.yml -f docker-compose.prod.yml down -v
