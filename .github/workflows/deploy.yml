# Build on GitHub, deploy backend + frontend to AWS EC2 via SSH
name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose files
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config

      - name: Build production images
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml build

  deploy-backend:
    name: Deploy backend to EC2
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy backend over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.EC2_DEPLOY_PATH }}"
            chmod +x scripts/deploy.sh scripts/sync-repo.sh
            ./scripts/deploy.sh

  deploy-frontend:
    name: Deploy frontend to EC2
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build React app
        working-directory: frontend
        env:
          VITE_API_URL: /api
        run: npm ci && npm run build

      - name: Verify build output
        run: test -f frontend/dist/index.html

      - name: Upload dist and reload nginx
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o BatchMode=yes"
          REMOTE="${EC2_USER}@${EC2_HOST}"
          DIST_PATH="${EC2_DEPLOY_PATH}/frontend/dist"

          echo "==> Preparing ${DIST_PATH} on EC2"
          ssh $SSH_OPTS "$REMOTE" "mkdir -p '${DIST_PATH}' && rm -rf '${DIST_PATH:?}'/*"

          echo "==> Rsync frontend/dist/ to EC2 (trailing slash copies contents into dist/)"
          rsync -avz --delete -e "ssh $SSH_OPTS" \
            frontend/dist/ "${REMOTE}:${DIST_PATH}/"

          echo "==> Verify index.html on server"
          ssh $SSH_OPTS "$REMOTE" "test -f '${DIST_PATH}/index.html' && ls -la '${DIST_PATH}' | head -20"

          echo "==> Reload nginx"
          ssh $SSH_OPTS "$REMOTE" \
            "cd '${EC2_DEPLOY_PATH}' && chmod +x scripts/deploy-frontend.sh && ./scripts/deploy-frontend.sh --reload-only"
