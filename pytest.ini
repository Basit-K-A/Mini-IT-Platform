[pytest]
# The app uses a flat layout (modules importable as `auth`, `crud`, ...),
# so put app/ on the import path for tests.
pythonpath = app
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -q --strict-markers
markers =
    unit: fast, isolated business-logic tests (no HTTP)
    integration: API + database tests via TestClient
filterwarnings =
    ignore::DeprecationWarning
