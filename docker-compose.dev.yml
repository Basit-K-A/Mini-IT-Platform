# Development overrides — merge with docker-compose.yml
# Hot reload + optional host access to PostgreSQL (pgAdmin, psql on Windows host)
#
# Use: docker compose --env-file .env.dev -f docker-compose.yml -f docker-compose.dev.yml up
# Keep POSTGRES_PASSWORD in sync with root .env (Compose loads .env for ${VAR} substitution).

services:
  db:
    env_file:
      - path: .env.dev
        required: false
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  api:
    # Optional: hit the API directly (bypass nginx) for debugging — Swagger at :8000/docs
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - path: .env.dev
        required: false
    volumes:
      # Mount source for uvicorn --reload (dependencies stay from image layers)
      - ./app:/app
    command:
      [
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--proxy-headers",
        "--forwarded-allow-ips",
        "*",
      ]
