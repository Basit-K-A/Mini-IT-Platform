# Nexventory — base Compose stack (nginx + api + PostgreSQL)
# Public entrypoint: http://localhost (nginx :80) — not the api port directly.
#
# Development (hot reload + publish DB port):
#   copy .env.dev.example .env.dev
#   docker compose --env-file .env.dev -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Production-like (no DB on host, detached):
#   copy .env.prod.example .env.prod
#   docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml up --build -d
#
# Default (base only, good for quick start):
#   copy .env.example .env
#   docker compose --env-file .env up --build

name: nexventory

services:
  db:
    image: postgres:17-alpine
    container_name: nexventory_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-mini_it_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: nexventory_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexventory_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      # Service hostname "db" is the Compose service name on the internal network
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-mini_it_platform}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-env-file}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173,http://localhost,http://127.0.0.1}
      CACHE_TTL_DASHBOARD: ${CACHE_TTL_DASHBOARD:-120}
      CACHE_TTL_LIST: ${CACHE_TTL_LIST:-60}
      CACHE_TTL_STATS: ${CACHE_TTL_STATS:-300}
      SLOW_QUERY_MS: ${SLOW_QUERY_MS:-500}
      SLOW_REQUEST_MS: ${SLOW_REQUEST_MS:-1000}
    # No ports published — traffic enters via nginx only (see docker-compose.dev.yml for direct API access)
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: nexventory_nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/conf.d/nexventory.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/snippets:/etc/nginx/snippets:ro
      - ./deploy/nginx/html:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://nexventory_api:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

networks:
  backend:
    name: nexventory_backend
    driver: bridge

volumes:
  postgres_data:
    name: nexventory_postgres_data
  redis_data:
    name: nexventory_redis_data
