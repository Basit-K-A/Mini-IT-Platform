# Docker Compose runs multiple containers on one virtual network.
# Services reach each other by service name (e.g. "db"), NOT "localhost".
#
# Start everything:
#   docker compose up --build
#
# Stop and remove containers (keep DB data in volume):
#   docker compose down
#
# Stop and remove containers + database volume:
#   docker compose down -v

services:
  db:
    image: postgres:17
    container_name: mini_it_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # Must match POSTGRES_PASSWORD in your .env (used by api DATABASE_URL below)
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-mini_it_platform}
    ports:
      # Host 5432 → container 5432 (optional: connect with pgAdmin from your machine)
      - "5432:5432"
    volumes:
      # Persist data across container restarts
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mini_it_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: .
    container_name: mini_it_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # Inside Docker, host is the service name "db" — not localhost.
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-mini_it_platform}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      # Override in .env for real secrets (see .env.example)
      SECRET_KEY: ${SECRET_KEY:-change-me-in-env-file}
    env_file:
      - .env

volumes:
  postgres_data:
